<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Poke API</title>
    <link rel="stylesheet" href="./css/normalize.css" />
    <link rel="stylesheet" href="./css/style.css" />
    <script src="./js/script.js" defer type="module"></script>
  </head>
  <body>
    <h1 id="sélectionner">Sélectionner la génération de Pokémon :</h1>
      <section id="filtre">
        <div class="select">
          <select>
            <option value="1">Génération 1</option>
            <option value="2">Génération 2</option>
            <option value="3">Génération 3</option>
            <option value="4">Génération 4</option>
            <option value="5">Génération 5</option>
            <option value="6">Génération 6</option>
            <option value="7">Génération 7</option>
            <option value="8">Génération 8</option>
          </select>
        </div>
      </section>
    <h1 id="types-title">Sélectionner le type d'un Pokémon :</h1>
      <section id="types">
        <button data-type="Plante">Plante</button>
        <button data-type="Feu">Feu</button>
        <button data-type="Eau">Eau</button>
        <button data-type="Insecte">Insecte</button>
        <button data-type="Normal">Normal</button>
        <button data-type="Poison">Poison</button>
        <button data-type="Vol">Vol</button>
        <button data-type="Électrik">Électrik</button>
        <button data-type="Combat">Combat</button>
        <button data-type="Psy">Psy</button>
        <button data-type="Roche">Roche</button>
        <button data-type="Sol">Sol</button>
        <button data-type="Glace">Glace</button>
        <button data-type="Dragon">Dragon</button>
        <button data-type="Ténèbres">Ténèbres</button>
        <button data-type="Acier">Acier</button>
        <button data-type="Fée">Fée</button>
      </section>

    <main>
    </main>
  </body>
</html>
